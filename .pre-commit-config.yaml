repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd dashboard-next && files=(); for f in "$@"; do files+=("${f#dashboard-next/}"); done; npx eslint "${files[@]}"' --
        language: system
        files: ^dashboard-next/src/.*\.(ts|tsx|js|jsx)$
        types: [file]
      - id: prettier
        name: prettier
        entry: bash -c 'cd dashboard-next && files=(); for f in "$@"; do files+=("${f#dashboard-next/}"); done; npx prettier --write --ignore-unknown "${files[@]}"' --
        language: system
        files: ^dashboard-next/src/.*\.(ts|tsx|js|jsx|css)$
        types: [file]
