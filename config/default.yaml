market:
  # Polymarket condition ID for the market to trade
  # Example: US Presidential Election 2024 Winner
  condition_id: "0x"
  clob_api_url: "https://clob.polymarket.com"
  # Token ID for the specific outcome to trade (YES token)
  token_id: ""

api:
  polymarket_host: "https://clob.polymarket.com"
  coingecko_url: "https://api.coingecko.com/api/v3"
  polymarket_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  # Chainlink BTC/USD price feed — matches Polymarket resolution source
  ethereum_rpc_url: "https://ethereum.publicnode.com"
  chainlink_btcusd_address: "0xF4030086522a5bEEa4988F8cA5B36dbC97BeE88c"

agent:
  decision_interval: 60        # seconds between cycles after first AI call (slow mode)
  fast_poll_interval: 10       # seconds between cycles before first AI call (fast polling)
  initial_cash: 1000.0         # starting paper balance in USDC
  max_cycles: 0                # 0 = unlimited
  min_confidence: 0.55         # minimum AI confidence to allow a BUY (lower = more trades)

ai:
  model: "claude-sonnet-4-5-20250929"
  screen_model: "claude-haiku-4-5-20251001"
  max_tokens: 1024
  temperature: 0.1            # mild exploration — slight variety in reasoning paths
  two_pass_enabled: true      # Haiku screens first, Sonnet only on trade setups

simulator:
  base_slippage_bps: 5        # base slippage in basis points
  proportional_factor: 1.0    # slippage multiplier for size/liquidity (realistic)
  fee_bps: 20                 # Polymarket taker fee (20bps = 0.2%)
  limit_order_ttl: 300        # default TTL for limit orders (seconds)

risk:
  max_position_pct: 0.40      # max 40% of portfolio in single position
  max_spread_pct: 0.10        # skip if spread > 10% (DOWN tokens often have wider spreads)
  min_liquidity: 100.0        # minimum orderbook depth in USDC
  daily_loss_limit_pct: 0.10  # stop trading if daily loss > 10%
  max_concentration_pct: 0.50 # max 50% of portfolio in all positions
  min_reward_risk_ratio: 1.3  # (1-price)/price must exceed this; blocks entries > ~$0.435

monitor:
  market_monitor_interval: 1.0
  position_monitor_interval: 1.0
  ai_cooldown_seconds: 60
  rr_trigger_threshold: 1.0
  stop_loss_pct: -0.60
  take_profit_pct: 0.80
  btc_price_cache_ttl: 2.0
  adaptive_entry_enabled: true
  adaptive_entry_window: 10
  dynamic_sl_enabled: true
  dynamic_tp_enabled: true
  sl_floor: -0.75          # never wider than -75%
  sl_ceiling: -0.15        # never tighter than -15%
  tp_floor: 0.20           # never below +20%
  tp_ceiling: 1.20         # never above +120%

trading:
  mode: "paper"                     # "paper" (default — simulation only) or "live" (real CLOB orders + shadow paper)
  # Credentials: set via env vars (POLYBOT_TRADING_PRIVATE_KEY, etc.) or here
  private_key: ""
  api_key: ""
  api_secret: ""
  api_passphrase: ""
  chain_id: 137                     # Polygon mainnet
  max_order_size_usd: 50.0          # hard cap per single order
  max_session_loss_usd: 40.0        # kill switch: shutdown if session loss exceeds this
  min_wallet_balance_usd: 5.0       # refuse BUY if wallet USDC below this
  max_price_drift_pct: 0.03         # 3% — skip trade if price moved since AI decision
  dry_run: false                    # sign orders but don't post (for testing auth flow)

logging:
  log_dir: "logs"
  jsonl_enabled: true
  sqlite_enabled: true
  sqlite_db_path: "logs/polybot.db"
  market_history_db_path: "data/market_history.db"
  dashboard_enabled: true
  dashboard_refresh_rate: 2   # seconds
