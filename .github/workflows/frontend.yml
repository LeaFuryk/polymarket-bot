name: Frontend Tests

on:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard-next/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Jest tests
        run: npx jest --ci --verbose
