name: Release - Tag & Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type for the next development cycle"
        required: true
        type: choice
        options:
          - minor
          - patch
        default: minor

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read & validate versions
        id: versions
        run: |
          # Extract version from pyproject.toml
          PROJ_VER=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "proj_ver=$PROJ_VER" >> "$GITHUB_OUTPUT"

          TAG="v${PROJ_VER}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Check tag doesn't already exist
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the version in pyproject.toml first."
            exit 1
          fi

          # Check that [Unreleased] section exists and has content
          UNRELEASED_CONTENT=$(awk '/^## \[Unreleased\]/{found=1; next} /^## /{if(found) exit} found' CHANGELOG.md)
          if [ -z "$(echo "$UNRELEASED_CONTENT" | tr -d '[:space:]')" ]; then
            echo "::error::No content under [Unreleased] in CHANGELOG.md. Add release notes before releasing."
            exit 1
          fi

          echo "✓ Version $PROJ_VER — tag $TAG does not exist, [Unreleased] has content"

      - name: Extract release notes from [Unreleased]
        run: |
          # Extract content between ## [Unreleased] and the next ## heading
          awk '/^## \[Unreleased\]/{found=1; next} /^## /{if(found) exit} found' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::warning::No content under [Unreleased] — falling back to first version section"
            awk '/^## \[v/{if(found) exit; found=1; next} found' CHANGELOG.md > /tmp/release-notes.md
          fi

          echo "--- Release notes ---"
          cat /tmp/release-notes.md

      - name: List merged PRs since previous tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(git log -1 --format=%as "$PREV_TAG")
            echo "Previous tag: $PREV_TAG ($PREV_DATE)"

            PR_LIST=$(gh pr list --state merged --search "merged:>=${PREV_DATE}" \
              --json number,title,author \
              --template '{{range .}}- #{{.number}} {{.title}} (@{{.author.login}}){{"\n"}}{{end}}')

            if [ -n "$PR_LIST" ]; then
              {
                echo ""
                echo "### Merged PRs"
                echo ""
                echo "$PR_LIST"
              } > /tmp/pr-list.md
            else
              echo "" > /tmp/pr-list.md
            fi
          else
            echo "No previous tag found"
            echo "" > /tmp/pr-list.md
          fi

      - name: Rename [Unreleased] to version heading
        run: |
          TAG="${{ steps.versions.outputs.tag }}"
          TODAY=$(date +%Y-%m-%d)

          # Replace ## [Unreleased] with ## [vX.Y.Z] — YYYY-MM-DD
          sed -i "s/^## \[Unreleased\]/## [${TAG}] — ${TODAY}/" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release ${TAG} — update CHANGELOG heading"

          # Push the CHANGELOG commit so the release target exists on the remote
          git push origin HEAD:main

          echo "✓ Renamed [Unreleased] to [${TAG}] — ${TODAY}"

      - name: Create tag & release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.versions.outputs.tag }}"

          # Combine release notes + PR list
          cat /tmp/release-notes.md /tmp/pr-list.md > /tmp/release-body.md

          gh release create "$TAG" \
            --target main \
            --title "$TAG" \
            --notes-file /tmp/release-body.md

          echo "✓ Created release $TAG"

      - name: Compute next version
        id: next
        run: |
          CURRENT="${{ steps.versions.outputs.proj_ver }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ inputs.bump }}" = "minor" ]; then
            NEXT="${MAJOR}.$((MINOR + 1)).0"
          else
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "next_ver=$NEXT" >> "$GITHUB_OUTPUT"
          echo "✓ Next version: $CURRENT → $NEXT (${{ inputs.bump }} bump)"

      - name: Create version-bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT="${{ steps.next.outputs.next_ver }}"
          BRANCH="chore/bump-v${NEXT}"

          # Delete stale remote branch from prior partial runs
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"

          # Bump pyproject.toml
          sed -i "s/^version = \".*\"/version = \"${NEXT}\"/" pyproject.toml

          # Insert ## [Unreleased] section before the first ## [v...] header
          awk '
            /^## \[v/ && !inserted {
              print "## [Unreleased]"
              print ""
              print ""
              inserted=1
            }
            {print}
          ' CHANGELOG.md > /tmp/changelog-new.md
          mv /tmp/changelog-new.md CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: bump version to v${NEXT} for next development cycle"
          git push origin "$BRANCH"

          TAG="${{ steps.versions.outputs.tag }}"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump version to v${NEXT}" \
            --body "Automated version bump after releasing ${TAG}.

          Bumps \`pyproject.toml\` and \`CHANGELOG.md\` to \`v${NEXT}\` for the next development cycle.

          Created by the **Release - Tag & Bump** workflow."

          echo "✓ Created bump PR for v${NEXT}"
