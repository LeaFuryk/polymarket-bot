name: Next Dashboard - Lint

on:
  push:
    branches: [main]
    paths:
      - "dashboard-next/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard-next/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      - name: Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,js,css}"
