name: Bot Python

on:
  push:
    branches: [main]
    paths:
      - "polybot/**"
      - "polybot_data/**"
      - "collector/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/python.yml"
  pull_request:
    branches: [main]
    paths:
      - "polybot/**"
      - "polybot_data/**"
      - "collector/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/python.yml"

jobs:
  lint:
    name: Bot Python - Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check polybot/ polybot_data/ collector/ tests/

      - name: Ruff format check
        run: uv run ruff format --check polybot/ polybot_data/ collector/ tests/

  test:
    name: Bot Python - Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Post test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: test-results.xml
          check_name: pytest results
