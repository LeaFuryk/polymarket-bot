<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyBot Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base: #080a0e;
  --bg-raised: #0d1017;
  --bg-surface: #131720;
  --bg-surface-hover: #171c28;
  --bg-inset: #0a0d13;
  --border-subtle: #1a1f2e;
  --border-default: #232a3b;
  --border-bright: #2e3750;
  --text-primary: #e8ecf4;
  --text-secondary: #8891a6;
  --text-tertiary: #5a6378;
  --text-muted: #3d4556;
  --green: #22c55e;
  --green-soft: #22c55e18;
  --green-mid: #22c55e40;
  --red: #ef4444;
  --red-soft: #ef444418;
  --red-mid: #ef444440;
  --amber: #f59e0b;
  --amber-soft: #f59e0b18;
  --cyan: #06b6d4;
  --cyan-soft: #06b6d418;
  --cyan-mid: #06b6d430;
  --blue: #3b82f6;
  --blue-soft: #3b82f618;
  --purple: #a78bfa;
  --mono: 'JetBrains Mono', 'IBM Plex Mono', monospace;
  --display: 'Space Grotesk', system-ui, sans-serif;
  --sidebar-w: 232px;
  --radius: 8px;
  --radius-sm: 5px;
}

html { font-size: 15px; -webkit-font-smoothing: antialiased; }

/* Tooltip on hover — 3 second delay via JS class */
[data-tip] { position: relative; }
[data-tip].tip-show::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  padding: 0.45rem 0.65rem;
  background: #1c2233;
  color: var(--text-secondary);
  font: 400 0.72rem/1.4 var(--mono);
  white-space: normal;
  max-width: 280px;
  min-width: 140px;
  border-radius: 6px;
  border: 1px solid var(--border-bright);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  z-index: 500;
  pointer-events: none;
  animation: tipIn 0.18s ease-out;
}
[data-tip].tip-show::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 3px);
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #1c2233;
  z-index: 501;
  pointer-events: none;
  animation: tipIn 0.18s ease-out;
}
@keyframes tipIn { from { opacity: 0; transform: translateX(-50%) translateY(3px); } to { opacity: 1; transform: translateX(-50%); } }

body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--mono);
  line-height: 1.5;
  min-height: 100vh;
}

/* Subtle noise texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ═══ LAYOUT ═══ */
.app {
  display: flex;
  min-height: 100vh;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-raised);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

.sb-brand {
  padding: 1.25rem 1.1rem 1.1rem;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 0.65rem;
}
.sb-logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  border-radius: 6px;
  display: grid; place-items: center;
  font: 700 14px/1 var(--display);
  color: var(--bg-base);
  flex-shrink: 0;
}
.sb-brand-text { display: flex; flex-direction: column; }
.sb-brand-name {
  font: 600 1rem/1.1 var(--display);
  letter-spacing: -0.01em;
  color: var(--text-primary);
}
.sb-brand-tag {
  font-size: 0.65rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.sb-section-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 1rem 1.1rem 0.4rem;
}

.sb-nav { flex: 1; padding-bottom: 0.5rem; }

.sb-item {
  display: block;
  padding: 0.55rem 1.1rem;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s ease;
  user-select: none;
}
.sb-item:hover { background: rgba(255,255,255,0.02); }
.sb-item.active {
  background: var(--cyan-soft);
  border-left-color: var(--cyan);
}
.sb-item-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}
.sb-item-label {
  font: 500 0.85rem/1.2 var(--display);
  color: var(--text-secondary);
}
.sb-item.active .sb-item-label { color: var(--text-primary); }
.sb-item-count {
  font-size: 0.65rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.04);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
}

/* Day header (non-clickable grouping label) */
.sb-day-header {
  padding: 0.7rem 1.1rem 0.2rem;
  font: 600 0.75rem/1.2 var(--display);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sb-day-header .sb-day-pnl {
  font: 600 0.7rem/1 var(--mono);
}
.sb-day-header .sb-day-pnl.pos { color: var(--green); }
.sb-day-header .sb-day-pnl.neg { color: var(--red); }
.sb-day-header .sb-day-pnl.zero { color: var(--text-muted); }

/* Session items (indented under day) */
.sb-item.sb-session {
  padding-left: 1.6rem;
}
.sb-session-time {
  font-size: 0.65rem;
  color: var(--text-muted);
  font-family: var(--mono);
}

.sb-item-metrics {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.2rem;
}
.sb-wl {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.05rem 0.3rem;
  border-radius: 3px;
}
.sb-wl.w { background: var(--green-soft); color: var(--green); }
.sb-wl.l { background: var(--red-soft); color: var(--red); }
.sb-pnl {
  font: 600 0.73rem/1 var(--mono);
}
.sb-pnl.pos { color: var(--green); }
.sb-pnl.neg { color: var(--red); }
.sb-pnl.zero { color: var(--text-muted); }

.sb-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 0.3rem 1.1rem;
}

.sb-footer {
  padding: 0.75rem 1.1rem;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.73rem;
  color: var(--text-tertiary);
}
.sb-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--text-muted);
}
.sb-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green-mid); animation: blink 2s ease-in-out infinite; }
.sb-dot.stale { background: var(--red); box-shadow: 0 0 6px var(--red-mid); }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ═══ MAIN ═══ */
.main {
  flex: 1;
  margin-left: var(--sidebar-w);
  padding: 1.25rem 1.5rem 2rem;
  min-width: 0;
}

/* Header bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border-subtle);
}
.topbar-left {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
}
.topbar-title {
  font: 600 1.3rem/1 var(--display);
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.topbar-sub {
  font-size: 0.8rem;
  color: var(--text-tertiary);
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.8rem;
  color: var(--text-tertiary);
}
.topbar-status {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-muted);
}
.status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green-mid); animation: blink 2s ease-in-out infinite; }
.status-dot.stale { background: var(--red); }

/* ═══ METRICS ROW ═══ */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
  gap: 0.65rem;
  margin-bottom: 1.25rem;
}

.metric {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 0.85rem 0.9rem 0.75rem;
  transition: border-color 0.15s;
  position: relative;
  overflow: visible;
}
.metric:hover { border-color: var(--border-default); }

/* Subtle top accent line */
.metric::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--border-default);
  opacity: 0;
  transition: opacity 0.15s;
}
.metric:hover::before { opacity: 1; }

.metric-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
}
.metric-value {
  font: 700 1.55rem/1 var(--display);
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.metric-sub {
  font-size: 0.73rem;
  color: var(--text-tertiary);
  margin-top: 0.2rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.v-green { color: var(--green); }
.v-red { color: var(--red); }
.v-amber { color: var(--amber); }
.v-cyan { color: var(--cyan); }
.v-blue { color: var(--blue); }

/* ═══ CONTENT GRID ═══ */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

.panel {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1rem;
  min-width: 0;
  overflow: visible;
}
.panel:hover { border-color: var(--border-default); }

.panel-full { grid-column: 1 / -1; }

.panel-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.85rem;
  font: 600 0.8rem/1 var(--display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
}
.panel-header::before {
  content: '';
  width: 3px; height: 12px;
  background: var(--cyan);
  border-radius: 2px;
  flex-shrink: 0;
}

/* ═══ LIVE ROW: Market + BTC + Positions ═══ */
.live-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1.5fr;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}

.market-title {
  font: 600 1.05rem/1.3 var(--display);
  color: var(--text-primary);
  margin-bottom: 0.2rem;
}
.market-link {
  color: var(--blue);
  text-decoration: none;
  font-size: 0.8rem;
}
.market-link:hover { text-decoration: underline; }

.countdown-wrap {
  text-align: right;
}
.countdown-val {
  font: 700 1.6rem/1 var(--display);
  color: var(--amber);
  letter-spacing: -0.02em;
}
.countdown-val.urgent { color: var(--red); }
.countdown-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

.token-row {
  display: flex;
  justify-content: space-between;
  padding: 0.35rem 0;
  border-top: 1px solid var(--border-subtle);
  font-size: 0.85rem;
}
.tok-up { color: var(--green); font-weight: 600; }
.tok-down { color: var(--red); font-weight: 600; }
.tok-val { font-weight: 600; }

.btc-price {
  font: 700 1.35rem/1 var(--display);
  margin-bottom: 0.3rem;
}
.btc-badge {
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  display: inline-block;
}
.btc-badge.up { background: var(--green-soft); color: var(--green); }
.btc-badge.down { background: var(--red-soft); color: var(--red); }
.btc-candle-dir {
  font-size: 0.73rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
}

.pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.pos-cell {
  padding: 0.5rem;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}
.pos-label {
  font-size: 0.73rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.2rem;
}
.pos-val { font: 700 1.15rem/1 var(--display); }
.pos-sub { font-size: 0.73rem; color: var(--text-muted); }
.pos-worth { font-size: 0.73rem; color: var(--text-secondary); margin-top: 0.15rem; }

/* ═══ CANDLE TIMELINES ═══ */
.candle-list {
  max-height: 600px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}
.candle-list::-webkit-scrollbar { width: 3px; }
.candle-list::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

.candle-row {
  border-bottom: 1px solid var(--border-subtle);
}
.candle-row:last-child { border-bottom: none; }

.candle-hdr {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 0;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.candle-hdr:hover { background: rgba(255,255,255,0.015); margin: 0 -1rem; padding-left: 1rem; padding-right: 1rem; }

.candle-chevron {
  font-size: 0.6rem;
  color: var(--text-muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
  width: 12px;
  text-align: center;
}
.candle-row.collapsed .candle-chevron { transform: rotate(-90deg); }

.candle-slug {
  font-size: 0.78rem;
  color: var(--text-secondary);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.candle-slug a { color: var(--blue); text-decoration: none; }
.candle-slug a:hover { text-decoration: underline; }

.candle-actions {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  flex-shrink: 0;
}
.ca-pill {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 0.1rem 0.3rem;
  border-radius: 3px;
  letter-spacing: 0.02em;
}
.ca-pill.b { background: var(--green-soft); color: var(--green); }
.ca-pill.s { background: var(--red-soft); color: var(--red); }
.ca-pill.h { background: rgba(255,255,255,0.04); color: var(--text-muted); }

.candle-pnl {
  font: 600 0.78rem/1 var(--mono);
  flex-shrink: 0;
  min-width: 55px;
  text-align: right;
}
.candle-pnl.pos { color: var(--green); }
.candle-pnl.neg { color: var(--red); }
.candle-pnl.zero { color: var(--text-muted); }

.candle-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 0.12rem 0.4rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.candle-badge.win { background: var(--green-soft); color: var(--green); border: 1px solid #22c55e25; }
.candle-badge.loss { background: var(--red-soft); color: var(--red); border: 1px solid #ef444425; }
.candle-badge.flat { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border-subtle); }
.candle-badge.live { background: var(--amber-soft); color: var(--amber); border: 1px solid #f59e0b30; animation: blink 2s ease-in-out infinite; }

/* Collapsible body */
.candle-body {
  overflow: hidden;
  max-height: 400px;
  transition: max-height 0.3s ease, opacity 0.15s ease;
  opacity: 1;
}
.candle-row.collapsed .candle-body {
  max-height: 0;
  opacity: 0;
}

/* Timeline track */
.tl-wrap {
  position: relative;
  height: 72px;
  margin: 0.25rem 8px 0.5rem;
}
.tl-line {
  position: absolute;
  top: 36px; left: 0; right: 0;
  height: 2px;
  background: var(--border-default);
}
.tl-end {
  position: absolute;
  top: 32px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border-default);
  border: 2px solid var(--text-muted);
}
.tl-end.start { left: -5px; }
.tl-end.finish { right: -5px; }
.tl-end.finish.up { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px var(--green-mid); }
.tl-end.finish.down { background: var(--red); border-color: var(--red); box-shadow: 0 0 6px var(--red-mid); }
.tl-end.finish.pending { background: var(--amber); border-color: var(--amber); }

.tl-labels {
  position: absolute;
  top: 48px;
  left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text-muted);
}

/* Trade dots */
.tl-dot {
  position: absolute;
  top: 22px;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 0.6rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.12s;
  z-index: 2;
  transform: translateX(-50%);
}
.tl-dot:hover { transform: translateX(-50%) scale(1.2); }
.tl-dot.sel { transform: translateX(-50%) scale(1.25); }
.tl-dot::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 50%;
  transform: translateX(-50%);
  width: 2px; height: 6px;
  background: var(--border-default);
}
.tl-dot.buy { background: var(--green); color: var(--bg-base); box-shadow: 0 0 8px var(--green-mid); }
.tl-dot.sell { background: var(--red); color: #fff; box-shadow: 0 0 8px var(--red-mid); }
.tl-dot.hold { background: var(--bg-inset); color: var(--text-muted); border: 2px solid var(--border-bright); }
.tl-dot.blocked { background: var(--bg-inset); color: var(--amber); border: 2px dashed var(--amber); opacity: 0.7; }

/* Detail panel */
.tl-detail {
  margin: 0.35rem 0;
  padding: 0.55rem 0.7rem;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  display: none;
  animation: fadeUp 0.15s ease-out;
}
.tl-detail.vis { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.td-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 0.15rem;
}
.td-lbl { color: var(--text-muted); min-width: 60px; flex-shrink: 0; }
.td-val { color: var(--text-primary); }
.td-reasoning {
  margin-top: 0.3rem;
  padding-top: 0.3rem;
  border-top: 1px dashed var(--border-subtle);
  color: var(--text-tertiary);
  line-height: 1.4;
}
.conf-bar {
  display: inline-block;
  width: 48px; height: 3px;
  background: var(--bg-base);
  border-radius: 2px;
  overflow: hidden;
  vertical-align: middle;
  margin-left: 0.3rem;
}
.conf-fill { height: 100%; border-radius: 2px; }

/* ═══ RESOLUTIONS TABLE ═══ */
.res-scroll {
  max-height: 280px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}
.res-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.res-table thead { position: sticky; top: 0; background: var(--bg-surface); z-index: 1; }
.res-table th {
  text-align: left;
  font-size: 0.65rem; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);

</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">P</div>
      <div class="sb-brand-text">
        <span class="sb-brand-name">PolyBot</span>
        <span class="sb-brand-tag">BTC 5m Candle</span>
      </div>
    </div>
    <nav class="sb-nav" id="sidebarNav"></nav>
    <div class="sb-footer">
      <span class="sb-dot" id="sbDot"></span>
      <span id="sbStatus">Connecting...</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="viewTitle">Overview</div>
        <div class="topbar-sub" id="viewSub"></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Connecting...</span>
        </div>
        <span id="refreshInfo">--</span>
      </div>
    </div>

    <!-- Metrics Row -->
    <div class="metrics-row" id="metricsRow"></div>

    <!-- Live Row (market, btc, positions) -->
    <div class="live-row" id="liveRow"></div>

    <!-- Content Grid -->
    <div class="content-grid" id="contentGrid"></div>
  </div>
</div>

<script>
const DATA_URL = '../logs/dashboard_data.json';
const REFRESH_SEC = 10;
const CANDLE_DUR = 300;
const TIP_DELAY = 3000; // 3 seconds before tooltip shows
let countdownTarget = 0;
let refreshCountdown = REFRESH_SEC;
let lastData = null;
let selectedView = 'overview';
let _tipTimer = null;

// Tooltip: show after 3 seconds of continuous hover
document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-tip]');
  if (!el) return;
  clearTimeout(_tipTimer);
  _tipTimer = setTimeout(() => el.classList.add('tip-show'), TIP_DELAY);
});
document.addEventListener('mouseout', e => {
  const el = e.target.closest('[data-tip]');
  if (!el) return;
  clearTimeout(_tipTimer);
  el.classList.remove('tip-show');
});

const $ = id => document.getElementById(id);
const fmt$ = (v, d=2) => v != null ? '$' + Number(v).toFixed(d) : '--';
const fmtPct = (v, d=1) => v != null ? Number(v).toFixed(d) + '%' : '--';
const fmtNum = (v, d=2) => v != null ? Number(v).toFixed(d) : '--';
const signCls = v => v > 0.001 ? 'v-green' : v < -0.001 ? 'v-red' : '';
const pnlCls = v => v > 0.001 ? 'pos' : v < -0.001 ? 'neg' : 'zero';
const pnlSign = v => v >= 0 ? '+' : '';

function confColor(c) {
  if (c >= 0.75) return 'var(--green)';
  if (c >= 0.6) return 'var(--cyan)';
  if (c >= 0.4) return 'var(--amber)';
  return 'var(--red)';
}

function shortTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function timeAgo(iso) {
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60) return Math.floor(s) + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function truncSlug(s, n=28) { return s.length > n ? '...' + s.slice(-n) : s; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const today = () => new Date().toISOString().slice(0, 10);
function dateLabel(d) {
  if (d === today()) return 'Today';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// ── Session detection ──
// A session = a continuous period the bot ran. Session breaks are detected
// by time gaps > 10 minutes between consecutive trades or cycle resets.
const SESSION_GAP_MS = 10 * 60 * 1000; // 10 minutes

function calcStats(resolutions) {
  let w = 0, l = 0, pnl = 0;
  for (const r of resolutions) {
    if (r.pnl > 0.001) w++;
    else if (r.pnl < -0.001) l++;
    pnl += r.pnl || 0;
  }
  const tot = w + l;
  return { w, l, pnl, winRate: tot > 0 ? (w / tot) * 100 : 0, count: resolutions.length };
}

function calcTradeStats(trades) {
  let invested = 0, returned = 0, buys = 0, sells = 0, holds = 0;
  let confSum = 0, confN = 0, totalFees = 0, totalAiCost = 0;
  let startCash = null, endCash = null, startPortfolio = null, endPortfolio = null;
  for (const t of trades) {
    // Track first/last cash & portfolio snapshots for session boundaries
    if (t.cash != null) {
      if (startCash === null) { startCash = t.cash; startPortfolio = t.portfolio_value; }
      endCash = t.cash;
      endPortfolio = t.portfolio_value;
    }
    totalAiCost += t.ai_cost || 0;
    if (t.risk_blocked) continue;
    const cost = (t.size || 0) * (t.fill_price || 0);
    if (t.action === 'BUY') { invested += cost; buys++; }
    else if (t.action === 'SELL') { returned += cost; sells++; }
    else { holds++; }
    if (t.confidence && t.action !== 'HOLD') { confSum += t.confidence; confN++; }
    totalFees += t.fee || 0;
  }
  return {
    invested, returned, buys, sells, holds, totalFees, totalAiCost,
    avgConf: confN > 0 ? confSum / confN : 0,
    startCash, endCash, startPortfolio, endPortfolio,
    hasCashData: startCash !== null,
  };
}

// Returns { days: Map<dateStr, { sessions: [{id, trades, resolutions, startTs, endTs}], ... }> }
let _cachedSessions = null;
let _cachedTradeCount = -1;

function detectSessions(trades, resolutions) {
  // Invalidate cache if trade count changed (new data fetched)
  if (_cachedSessions && trades.length === _cachedTradeCount) return _cachedSessions;
  _cachedTradeCount = trades.length;
  _cachedSessions = null;

  // Group trades into sessions by time gaps
  const allSessions = []; // flat list of {id, trades, startTs, endTs}
  let currentBatch = [];
  let prevTime = null;
  let prevCycle = null;

  const sortedTrades = [...trades].sort((a, b) => a.timestamp.localeCompare(b.timestamp));

  for (const t of sortedTrades) {
    const ts = new Date(t.timestamp).getTime();
    const cycle = t.cycle || 0;
    let isBreak = false;
    if (prevTime !== null) {
      const gap = ts - prevTime;
      if (gap > SESSION_GAP_MS) isBreak = true;
      if (prevCycle !== null && cycle <= 2 && prevCycle > 5) isBreak = true;
    }
    if (isBreak && currentBatch.length > 0) {
      allSessions.push(currentBatch);
      currentBatch = [];
    }
    currentBatch.push(t);
    prevTime = ts;
    prevCycle = cycle;
  }
  if (currentBatch.length > 0) allSessions.push(currentBatch);

  // Build session objects with IDs
  const sessions = allSessions.map((batch, i) => {
    const startTs = batch[0].timestamp;
    const endTs = batch[batch.length - 1].timestamp;
    return {
      id: 'sess-' + i,
      trades: batch,
      resolutions: [], // filled below
      startTs,
      endTs,
      date: startTs.slice(0, 10),
    };
  });

  // Build slug→session index: match resolutions to the session that traded that candle
  const slugToSession = new Map();
  for (const s of sessions) {
    for (const t of s.trades) {
      if (t.candle_slug) slugToSession.set(t.candle_slug, s);
    }
  }

  // Assign resolutions to sessions — prefer slug match, fall back to nearest preceding session
  for (const r of resolutions) {
    // Primary: match by candle slug (reliable even across restarts)
    if (r.slug && slugToSession.has(r.slug)) {
      slugToSession.get(r.slug).resolutions.push(r);
      continue;
    }
    // Fallback: assign to the most recent session that ended before this resolution.
    // This handles resolutions from candles that resolved after a run was stopped
    // (e.g., pending bet recovery on restart). Those candles belong to the run
    // that was active when they were trading.
    const rTs = new Date(r.timestamp).getTime();
    let bestSess = null;
    let bestDist = Infinity;
    for (const s of sessions) {
      const sEnd = new Date(s.endTs).getTime();
      const sStart = new Date(s.startTs).getTime();
      // Resolution falls within the session window (with generous buffer)
      if (rTs >= sStart - 60000 && rTs <= sEnd + 60 * 60000) {
        const dist = Math.abs(rTs - sEnd);
        if (dist < bestDist) { bestDist = dist; bestSess = s; }
      }
    }
    if (bestSess) bestSess.resolutions.push(r);
  }

  // Group sessions by date
  const days = new Map(); // dateStr -> { sessions: [...], allTrades, allResolutions }
  for (const s of sessions) {
    if (!days.has(s.date)) days.set(s.date, { sessions: [], allTrades: [], allResolutions: [] });
    const day = days.get(s.date);
    day.sessions.push(s);
    day.allTrades.push(...s.trades);
    day.allResolutions.push(...s.resolutions);
  }

  // Also add orphaned resolutions to their day
  for (const r of resolutions) {
    const rDate = (r.timestamp || '').slice(0, 10);
    if (!rDate) continue;
    if (!days.has(rDate)) days.set(rDate, { sessions: [], allTrades: [], allResolutions: [] });
    const day = days.get(rDate);
    if (!day.allResolutions.includes(r)) day.allResolutions.push(r);
  }

  _cachedSessions = { days, sessions };
  return _cachedSessions;
}

function filteredData(data, view) {
  const t = data.trades || [], r = data.resolutions || [];
  if (view === 'overview') return { trades: t, resolutions: r };

  const info = detectSessions(t, r);

  // Check if it's a session ID
  if (view.startsWith('sess-')) {
    const sess = info.sessions.find(s => s.id === view);
    if (sess) return { trades: sess.trades, resolutions: sess.resolutions };
  }

  // It's a date
  const day = info.days.get(view);
  if (day) return { trades: day.allTrades, resolutions: day.allResolutions };

  return { trades: [], resolutions: [] };
}

// ── Sidebar ──
function renderSidebar(data) {
  const allTrades = data.trades || [];
  const allRes = data.resolutions || [];
  const info = detectSessions(allTrades, allRes);
  const allStats = calcStats(allRes);
  const dates = [...info.days.keys()].sort((a, b) => b.localeCompare(a));

  let h = '';
  h += '<div class="sb-section-label">Navigation</div>';

  // Overview
  const oa = selectedView === 'overview' ? ' active' : '';
  h += `<div class="sb-item${oa}" onclick="selectView('overview')">
    <div class="sb-item-top"><span class="sb-item-label">Overview</span>
    <span class="sb-item-count">${allRes.length} res</span></div>
    <div class="sb-item-metrics">
      <span class="sb-wl w">${allStats.w}W</span>
      <span class="sb-wl l">${allStats.l}L</span>
      <span class="sb-pnl ${pnlCls(allStats.pnl)}">${pnlSign(allStats.pnl)}${allStats.pnl.toFixed(2)}</span>
    </div>
  </div>`;

  h += '<div class="sb-divider"></div>';

  for (const dateStr of dates) {
    const day = info.days.get(dateStr);
    const daySt = calcStats(day.allResolutions);
    const dayActive = selectedView === dateStr ? ' active' : '';

    // Day header with aggregate PnL
    h += `<div class="sb-day-header">
      <span>${esc(dateLabel(dateStr))}</span>
      <span class="sb-day-pnl ${pnlCls(daySt.pnl)}">${pnlSign(daySt.pnl)}${daySt.pnl.toFixed(2)}</span>
    </div>`;

    // Day-level item (all sessions combined)
    h += `<div class="sb-item${dayActive}" onclick="selectView('${dateStr}')">
      <div class="sb-item-top"><span class="sb-item-label">All ${dateLabel(dateStr)}</span>
      <span class="sb-item-count">${day.allTrades.length} trades</span></div>
      <div class="sb-item-metrics">
        <span class="sb-wl w">${daySt.w}W</span>
        <span class="sb-wl l">${daySt.l}L</span>
        <span class="sb-pnl ${pnlCls(daySt.pnl)}">${pnlSign(daySt.pnl)}${daySt.pnl.toFixed(2)}</span>
      </div>
    </div>`;

    // Individual sessions under this day
    if (day.sessions.length > 1) {
      for (let si = 0; si < day.sessions.length; si++) {
        const sess = day.sessions[si];
        const sst = calcStats(sess.resolutions);
        const sessActive = selectedView === sess.id ? ' active' : '';
        const startTime = new Date(sess.startTs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const endTime = new Date(sess.endTs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        h += `<div class="sb-item sb-session${sessActive}" onclick="selectView('${sess.id}')">
          <div class="sb-item-top">
            <span class="sb-item-label">Run ${si + 1} <span class="sb-session-time">${startTime}–${endTime}</span></span>
            <span class="sb-item-count">${sess.trades.length}t</span>
          </div>
          <div class="sb-item-metrics">
            <span class="sb-wl w">${sst.w}W</span>
            <span class="sb-wl l">${sst.l}L</span>
            <span class="sb-pnl ${pnlCls(sst.pnl)}">${pnlSign(sst.pnl)}${sst.pnl.toFixed(2)}</span>
          </div>
        </div>`;
      }
    }

    h += '<div class="sb-divider"></div>';
  }

  $('sidebarNav').innerHTML = h;
}

function selectView(v) {
  selectedView = v;
  if (lastData) { renderSidebar(lastData); render(lastData); }
}

// ── Fetch ──
async function fetchData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    lastData = data;
    renderSidebar(data);
    render(data);
    updateStatus(true, data.updated_at);
  } catch (e) {
    console.warn('Fetch failed:', e);
    updateStatus(false);
  }
  refreshCountdown = REFRESH_SEC;
}

function updateStatus(ok, at) {
  const setCls = (el, cls) => el.className = cls;
  if (ok) {
    const age = (Date.now() - new Date(at).getTime()) / 1000;
    const c = age < 120 ? 'live' : 'stale';
    const t = age < 120 ? 'Live' : 'Stale (' + timeAgo(at) + ')';
    setCls($('statusDot'), 'status-dot ' + c);
    $('statusText').textContent = t;
    setCls($('sbDot'), 'sb-dot ' + c);
    $('sbStatus').textContent = t;
  } else {
    setCls($('statusDot'), 'status-dot stale');
    $('statusText').textContent = 'Disconnected';
    setCls($('sbDot'), 'sb-dot stale');
    $('sbStatus').textContent = 'Offline';
  }
}

// ── Main render ──
function render(d) {
  const isOv = selectedView === 'overview';
  const isToday = selectedView === today();
  const isSess = selectedView.startsWith('sess-');
  // Show live panels if overview, today, or a session that is currently active
  let showLive = isOv || isToday;
  if (isSess && d.current_market) {
    const info = detectSessions(d.trades || [], d.resolutions || []);
    const sess = info.sessions.find(s => s.id === selectedView);
    if (sess) {
      // Session is "live" if its latest trade is within the last 15 minutes
      const latestTs = new Date(sess.endTs).getTime();
      showLive = (Date.now() - latestTs) < 15 * 60 * 1000;
    }
  }
  const fd = filteredData(d, selectedView);
  const stats = calcStats(fd.resolutions);
  const s = d.session;

  // Topbar title
  if (isOv) {
    $('viewTitle').textContent = 'Overview';
    $('viewSub').textContent = 'All-time aggregate';
  } else if (isSess) {
    const info = detectSessions(d.trades || [], d.resolutions || []);
    const sess = info.sessions.find(s => s.id === selectedView);
    if (sess) {
      const dayIdx = info.days.get(sess.date)?.sessions.indexOf(sess) ?? 0;
      const start = new Date(sess.startTs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const end = new Date(sess.endTs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      $('viewTitle').textContent = `Run ${dayIdx + 1} — ${start}–${end}`;
      $('viewSub').textContent = dateLabel(sess.date);
    } else {
      $('viewTitle').textContent = 'Session';
      $('viewSub').textContent = selectedView;
    }
  } else {
    $('viewTitle').textContent = dateLabel(selectedView);
    $('viewSub').textContent = selectedView;
  }

  // Metrics
  const ts = calcTradeStats(fd.trades);
  let mh = '';
  mh += `<div class="metric" data-tip="Percentage of resolved candles where the bot made a profit. Wins / (Wins + Losses)."><div class="metric-label">Win Rate</div>
    <div class="metric-value ${stats.winRate >= 50 ? 'v-green' : stats.count > 0 ? 'v-red' : ''}">${fmtPct(stats.winRate, 0)}</div>
    <div class="metric-sub">${stats.w}W / ${stats.l}L</div></div>`;
  mh += `<div class="metric" data-tip="Total profit or loss from all resolved candle markets. Sum of gains from winning bets minus losses from losing bets."><div class="metric-label">PnL</div>
    <div class="metric-value ${signCls(stats.pnl)}">${fmt$(stats.pnl, 4)}</div>
    <div class="metric-sub">${stats.count} resolutions</div></div>`;

  // Open Trade PnL: realized P&L from buy/sell round-trips on the current unresolved candle
  if (showLive) {
    const mtp = s.market_trading_pnl || 0;
    mh += `<div class="metric" data-tip="Realized P&L from trades closed on the current (unresolved) candle. This is already reflected in cash but not yet in resolution PnL. Resets to $0 on each candle rotation."><div class="metric-label">Open Trade PnL</div>
      <div class="metric-value ${signCls(mtp)}">${fmt$(mtp, 4)}</div>
      <div class="metric-sub">current candle</div></div>`;
  }

  if (showLive && isOv) {
    // Overview: show global bot state with initial_cash reference
    mh += `<div class="metric" data-tip="Current available cash in the bot's wallet. This is undeployed capital that can be used for new trades."><div class="metric-label">Cash</div>
      <div class="metric-value v-cyan">${fmt$(s.cash, 2)}</div>
      <div class="metric-sub">initial: ${fmt$(s.initial_cash, 0)}</div></div>`;
    mh += `<div class="metric" data-tip="Total value: cash + current market value of all open token positions. Tracks overall account performance."><div class="metric-label">Portfolio</div>
      <div class="metric-value v-blue">${fmt$(s.portfolio_value, 2)}</div>
      <div class="metric-sub">${pnlSign(s.portfolio_value - s.initial_cash)}${fmtNum(s.portfolio_value - s.initial_cash, 2)} from start</div></div>`;
  } else if (showLive && ts.hasCashData) {
    // Live session/day view with per-trade snapshots: show session-scoped start→current
    const sessionStartCash = ts.startCash;
    const sessionStartPort = ts.startPortfolio;
    const cashDelta = s.cash - sessionStartCash;
    const portDelta = s.portfolio_value - sessionStartPort;
    mh += `<div class="metric" data-tip="Current cash for this session. Shows change from the session's starting cash, not the all-time initial balance."><div class="metric-label">Cash</div>
      <div class="metric-value v-cyan">${fmt$(s.cash, 2)}</div>
      <div class="metric-sub">start: ${fmt$(sessionStartCash, 2)} (${pnlSign(cashDelta)}${fmtNum(cashDelta, 2)})</div></div>`;
    mh += `<div class="metric" data-tip="Current portfolio value for this session. Shows change from the session's starting value."><div class="metric-label">Portfolio</div>
      <div class="metric-value v-blue">${fmt$(s.portfolio_value, 2)}</div>
      <div class="metric-sub">start: ${fmt$(sessionStartPort, 2)} (${pnlSign(portDelta)}${fmtNum(portDelta, 2)})</div></div>`;
  } else if (ts.hasCashData) {
    // Historical session with per-trade cash snapshots: show start→end cash & portfolio
    const cashDelta = ts.endCash - ts.startCash;
    const portDelta = ts.endPortfolio - ts.startPortfolio;
    mh += `<div class="metric" data-tip="Cash at the start and end of this session. Shows how much undeployed capital changed across the session."><div class="metric-label">Cash</div>
      <div class="metric-value v-cyan">${fmt$(ts.endCash, 2)}</div>
      <div class="metric-sub">start: ${fmt$(ts.startCash, 2)} (${pnlSign(cashDelta)}${fmtNum(cashDelta, 2)})</div></div>`;
    mh += `<div class="metric" data-tip="Portfolio value (cash + positions) at end of session vs start. Tracks overall account performance for this session."><div class="metric-label">Portfolio</div>
      <div class="metric-value v-blue">${fmt$(ts.endPortfolio, 2)}</div>
      <div class="metric-sub">start: ${fmt$(ts.startPortfolio, 2)} (${pnlSign(portDelta)}${fmtNum(portDelta, 2)})</div></div>`;
  } else {
    // No per-trade snapshots: fall back to invested/returned
    mh += `<div class="metric" data-tip="Total dollars spent buying UP and DOWN tokens during this period. Sum of (shares x price) for all BUY orders."><div class="metric-label">Invested</div>
      <div class="metric-value v-cyan">${fmt$(ts.invested, 2)}</div>
      <div class="metric-sub">${ts.buys} buy orders</div></div>`;
    mh += `<div class="metric" data-tip="Total dollars received from selling tokens before market resolution. Sum of (shares x price) for all SELL orders."><div class="metric-label">Returned</div>
      <div class="metric-value v-blue">${fmt$(ts.returned, 2)}</div>
      <div class="metric-sub">${ts.sells} sell orders</div></div>`;
  }

  // AI Cost: use bot's live total for any live view, per-trade sums for historical
  const aiCostVal = showLive ? s.total_ai_cost : ts.totalAiCost;
  const pfSkipped = s.prefilter_skipped || 0, pfChecked = s.prefilter_checked || 0;
  const pfRate = pfChecked > 0 ? (pfSkipped / pfChecked * 100).toFixed(0) + '%' : '--';
  const aiCostSub = showLive ? `pre-filter: ${pfSkipped}/${pfChecked} skipped (${pfRate})` : ts.totalAiCost > 0 ? `${fd.trades.length} cycles` : 'no data';
  mh += `<div class="metric" data-tip="Total cost of Claude API calls for AI decisions and reflections. Pre-filter shows how many cycles were skipped without calling AI (saving cost)."><div class="metric-label">AI Cost</div>
    <div class="metric-value v-amber">${fmt$(aiCostVal, 4)}</div>
    <div class="metric-sub">${aiCostSub}</div></div>`;

  // Trading Fees: use bot's live total for any live view, per-trade sums for historical
  const feesVal = showLive ? s.total_fees : ts.totalFees;
  const feesSub = showLive ? 'current session' : `${ts.buys + ts.sells} fills`;
  mh += `<div class="metric" data-tip="Total simulated Polymarket trading fees (20bps per fill). Deducted from cash on each executed trade."><div class="metric-label">Fees</div>
    <div class="metric-value v-red">${fmt$(feesVal, 4)}</div>
    <div class="metric-sub">${feesSub}</div></div>`;

  mh += `<div class="metric" data-tip="Average confidence level the AI assigned to its BUY/SELL decisions. Higher means the bot was more certain about its trades."><div class="metric-label">Avg Conf</div>
    <div class="metric-value ${ts.avgConf >= 0.6 ? 'v-green' : ts.avgConf > 0 ? 'v-amber' : ''}">${ts.avgConf > 0 ? fmtPct(ts.avgConf * 100, 0) : '--'}</div>
    <div class="metric-sub">${ts.buys + ts.sells} decisions</div></div>`;
  mh += `<div class="metric" data-tip="Total number of trade cycles the bot executed (BUY, SELL, and HOLD decisions combined)."><div class="metric-label">Trades</div>
    <div class="metric-value">${fd.trades.length}</div>
    <div class="metric-sub">${isOv ? 'all time' : isSess ? 'this session' : dateLabel(selectedView)}</div></div>`;
  $('metricsRow').innerHTML = mh;

  // Live row
  if (showLive) {
    const m = d.current_market || {};
    const b = d.btc || {};
    const p = d.positions || {};
    let lh = '';

    // Market panel
    lh += `<div class="panel" data-tip="The active 5-minute BTC candle market the bot is currently trading. Shows token midpoint prices and time until resolution.">
      <div class="panel-header">Current Market</div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:0.5rem">
        <div>
          <div class="market-title" id="mktTitle">${esc(m.title || 'Waiting...')}</div>
          ${m.polymarket_url ? `<a class="market-link" href="${esc(m.polymarket_url)}" target="_blank">View on Polymarket</a>` : ''}
        </div>
        <div class="countdown-wrap">
          <div class="countdown-val" id="countdown">--:--</div>
          <div class="countdown-label">Remaining</div>
        </div>
      </div>
      <div class="token-row" data-tip="UP token: pays $1 if BTC closes higher than or equal to its opening price."><span class="tok-up">UP</span><span class="tok-val">${m.up_mid != null ? fmtNum(m.up_mid, 4) : '--'}</span></div>
      <div class="token-row" data-tip="DOWN token: pays $1 if BTC closes lower than its opening price."><span class="tok-down">DOWN</span><span class="tok-val">${m.down_mid != null ? fmtNum(m.down_mid, 4) : '--'}</span></div>
    </div>`;

    if (m.time_remaining) countdownTarget = Date.now() + m.time_remaining * 1000;
    else countdownTarget = 0;

    // BTC panel
    const chCls = (b.change_24h_pct || 0) >= 0 ? 'up' : 'down';
    const chSign = (b.change_24h_pct || 0) >= 0 ? '+' : '';
    const clPrice = b.chainlink_price ? '$' + Number(b.chainlink_price).toLocaleString(undefined, {maximumFractionDigits:0}) : null;
    const divAbs = b.price_divergence != null ? Math.abs(b.price_divergence) : null;
    const divWarn = divAbs != null && divAbs > 50;
    lh += `<div class="panel" data-tip="Current BTC/USD spot price from Binance. The bot uses BTC price movement to predict UP/DOWN candle outcomes.">
      <div class="panel-header">BTC Price</div>
      <div class="btc-price">${b.price_usd ? '$' + Number(b.price_usd).toLocaleString(undefined, {maximumFractionDigits:0}) : '--'}</div>
      <span class="btc-badge ${chCls}">${chSign}${fmtNum(b.change_24h_pct, 2)}% 24h</span>
      <div class="btc-candle-dir">Last candle: ${(b.last_candle_direction || '--').toUpperCase()}</div>
      ${clPrice ? `<div style="margin-top:0.4rem;padding-top:0.35rem;border-top:1px solid var(--border-subtle);font-size:0.73rem">
        <span style="color:var(--text-muted)">Chainlink:</span> <span style="color:var(--text-secondary)">${clPrice}</span>
        ${divAbs != null ? `<span style="color:${divWarn ? 'var(--amber)' : 'var(--text-muted)'};margin-left:0.4rem" data-tip="Divergence between Binance and Chainlink prices. >$50 = resolution risk since Polymarket resolves via Chainlink.">${divWarn ? '⚠ ' : ''}$${fmtNum(divAbs, 0)} div</span>` : ''}
      </div>` : ''}
    </div>`;

    // Open Positions panel — rewritten for clarity
    const upShares = p.up_shares || 0;
    const downShares = p.down_shares || 0;
    const upAvg = p.up_avg_entry || 0;
    const downAvg = p.down_avg_entry || 0;
    const upMid = m.up_mid || 0.5;
    const downMid = m.down_mid || 0.5;
    const upPL = upShares > 0 ? (upMid - upAvg) * upShares : 0;
    const downPL = downShares > 0 ? (downMid - downAvg) * downShares : 0;

    lh += `<div class="panel" data-tip="Tokens the bot currently holds for the active candle. Each token pays $1 if correct, $0 if wrong. Unrealized P&L is based on current midpoint vs entry price.">
      <div class="panel-header">Open Positions</div>
      <div class="pos-grid">
        <div class="pos-cell" data-tip="UP tokens held. Each pays $1 at resolution if BTC closes >= open price. Avg entry is what the bot paid per token.">
          <div class="pos-label" style="color:var(--green)">UP Tokens</div>
          <div class="pos-val">${fmtNum(upShares, 1)} <span style="font-size:0.7rem;color:var(--text-muted)">shares</span></div>
          <div class="pos-sub">entry: ${upAvg > 0 ? '$' + fmtNum(upAvg, 4) : 'none'}</div>
          ${upShares > 0 ? `<div class="pos-worth ${upPL >= 0 ? 'v-green' : 'v-red'}">${pnlSign(upPL)}$${fmtNum(Math.abs(upPL), 2)} unrealized</div>` : ''}
        </div>
        <div class="pos-cell" data-tip="DOWN tokens held. Each pays $1 at resolution if BTC closes < open price. Avg entry is what the bot paid per token.">
          <div class="pos-label" style="color:var(--red)">DOWN Tokens</div>
          <div class="pos-val">${fmtNum(downShares, 1)} <span style="font-size:0.7rem;color:var(--text-muted)">shares</span></div>
          <div class="pos-sub">entry: ${downAvg > 0 ? '$' + fmtNum(downAvg, 4) : 'none'}</div>
          ${downShares > 0 ? `<div class="pos-worth ${downPL >= 0 ? 'v-green' : 'v-red'}">${pnlSign(downPL)}$${fmtNum(Math.abs(downPL), 2)} unrealized</div>` : ''}
        </div>
      </div>
    </div>`;

    $('liveRow').innerHTML = lh;
    $('liveRow').style.display = '';
  } else {
    $('liveRow').innerHTML = '';
    $('liveRow').style.display = 'none';
    countdownTarget = 0;
  }

  // Content grid
  let cg = '';

  // Candle timelines (full width)
  cg += `<div class="panel panel-full" data-tip="Each row is a 5-minute BTC candle market. Click a row to expand and see the bot's trades plotted on a timeline. Green dots = BUY, red = SELL, gray = HOLD.">
    <div class="panel-header">Candle Timelines</div>
    <div class="candle-list" id="candleList">${buildCandleTimelines(fd.trades, fd.resolutions, d.current_market)}</div>
  </div>`;

  // Resolutions
  cg += `<div class="panel" data-tip="Final outcomes of each candle market. Shows whether BTC went UP or DOWN and the bot's profit/loss for each resolved candle.">
    <div class="panel-header">Resolutions</div>
    <div class="res-scroll">${buildResTable(fd.resolutions)}</div>
  </div>`;

  // PnL Chart
  cg += `<div class="panel" data-tip="Running total of profit and loss over time. Each point is a resolved candle. Green area = profitable, red area = in drawdown.">
    <div class="panel-header">Cumulative PnL</div>
    <div class="chart-wrap" id="chartWrap">${buildChart(fd.resolutions)}</div>
  </div>`;

  // Risk
  if (d.risk) {
    const rk = d.risk;
    cg += `<div class="panel" data-tip="Risk management limits tracked by the bot. If daily loss or trade limits are exceeded, the bot halts trading to protect capital.">
      <div class="panel-header">Risk</div>
      <div class="risk-grid">
        <div class="risk-cell" data-tip="Total profit/loss for today. Tracked for daily loss limits."><div class="risk-lbl">Daily PnL</div><div class="risk-val" style="color:${rk.daily_pnl>=0?'var(--green)':'var(--red)'}">${fmt$(rk.daily_pnl, 4)}</div></div>
        <div class="risk-cell" data-tip="Number of trades executed today. Tracked against daily trade limit."><div class="risk-lbl">Daily Trades</div><div class="risk-val">${rk.daily_trades}</div></div>
        <div class="risk-cell" data-tip="Total Polymarket trading fees paid today."><div class="risk-lbl">Daily Fees</div><div class="risk-val">${fmt$(rk.daily_fees, 4)}</div></div>
        <div class="risk-cell" data-tip="Largest peak-to-trough decline in portfolio value. If this exceeds the limit, trading is halted."><div class="risk-lbl">Max Drawdown</div><div class="risk-val">${fmt$(rk.max_drawdown, 4)}</div></div>
        <div class="risk-status ${rk.is_halted?'halted':'ok'}">${rk.is_halted?'HALTED':'ACTIVE'}</div>
      </div>
    </div>`;
  }

  // Intelligence panel — ML, calibration, exit analysis
  if (d.ml_model || d.calibration || d.exit_analysis) {
    cg += `<div class="panel" data-tip="AI intelligence systems: ML model stats, confidence calibration curve, and exit analysis performance.">
      <div class="panel-header">Intelligence</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem">`;

    // ML Model
    const ml = d.ml_model || {};
    cg += `<div style="padding:0.5rem;background:var(--bg-inset);border:1px solid var(--border-subtle);border-radius:var(--radius-sm)">
      <div style="font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.3rem">ML Model</div>
      <div style="font:600 1rem/1.2 var(--display);color:${ml.model_trained ? 'var(--green)' : 'var(--amber)'}">${ml.model_trained ? 'Trained' : 'Training'}</div>
      <div style="font-size:0.73rem;color:var(--text-muted)">${ml.training_samples || 0} samples</div>
    </div>`;

    // Exit Analysis
    const ex = d.exit_analysis || {};
    const goodPct = ex.total_exits > 0 ? (ex.good_exit_rate * 100).toFixed(0) : '--';
    cg += `<div style="padding:0.5rem;background:var(--bg-inset);border:1px solid var(--border-subtle);border-radius:var(--radius-sm)">
      <div style="font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.3rem">Exit Quality</div>
      <div style="font:600 1rem/1.2 var(--display);color:${ex.good_exit_rate >= 0.5 ? 'var(--green)' : ex.total_exits > 0 ? 'var(--red)' : ''}">${goodPct}%</div>
      <div style="font-size:0.73rem;color:var(--text-muted)">${ex.total_exits || 0} exits analyzed</div>
    </div>`;

    // Calibration summary
    const cal = d.calibration || {};
    cg += `<div style="padding:0.5rem;background:var(--bg-inset);border:1px solid var(--border-subtle);border-radius:var(--radius-sm)">
      <div style="font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.3rem">Calibration</div>
      <div style="font:600 1rem/1.2 var(--display)">${cal.total_records || 0}</div>
      <div style="font-size:0.73rem;color:var(--text-muted)">records tracked</div>
    </div>`;

    cg += `</div>`; // close grid

    // Calibration bins chart (bar chart)
    const bins = (cal.bins || []).filter(b => b.wins + b.losses > 0);
    if (bins.length > 0) {
      cg += `<div style="margin-top:0.6rem;padding-top:0.5rem;border-top:1px solid var(--border-subtle)">
        <div style="font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.4rem">Calibration Curve</div>
        <div style="display:flex;align-items:flex-end;gap:3px;height:60px">`;
      for (const bin of bins) {
        const total = bin.wins + bin.losses;
        const wr = bin.win_rate;
        const h = Math.max(4, wr * 56);
        const barCol = wr >= 0.55 ? 'var(--green)' : wr >= 0.45 ? 'var(--amber)' : 'var(--red)';
        const opacity = bin.reliable ? '1' : '0.4';
        cg += `<div data-tip="${bin.range}: ${(wr*100).toFixed(0)}% win rate (${bin.wins}W/${bin.losses}L)${bin.reliable ? '' : ' — insufficient data'}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="font-size:0.55rem;color:var(--text-muted)">${(wr*100).toFixed(0)}%</div>
          <div style="width:100%;height:${h}px;background:${barCol};border-radius:2px;opacity:${opacity}"></div>
          <div style="font-size:0.5rem;color:var(--text-muted);white-space:nowrap">${bin.range}</div>
        </div>`;
      }
      cg += `</div>
        <div style="margin-top:0.3rem;display:flex;justify-content:center">
          <div style="font-size:0.6rem;color:var(--text-muted)">
            <span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:2px;vertical-align:middle;margin-right:3px"></span>above break-even
            <span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:2px;vertical-align:middle;margin:0 3px 0 8px"></span>below break-even
          </div>
        </div>
      </div>`;
    }

    // Exit analysis detail
    if (ex.total_exits > 0) {
      cg += `<div style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border-subtle);display:flex;gap:1rem;font-size:0.73rem">
        <div><span style="color:var(--text-muted)">Good exits:</span> <span style="color:var(--green)">${ex.good_exits}/${ex.total_exits}</span></div>
        <div><span style="color:var(--text-muted)">Saved:</span> <span style="color:var(--green)">${fmt$(ex.total_saved, 2)}</span></div>
        <div><span style="color:var(--text-muted)">Missed:</span> <span style="color:var(--red)">${fmt$(ex.total_missed, 2)}</span></div>
      </div>`;
    }

    cg += `</div>`; // close panel
  }

  $('contentGrid').innerHTML = cg;
}

// ═══ CANDLE TIMELINES ═══
function buildCandleTimelines(trades, resolutions, currentMarket) {
  if (!trades.length) return '<div class="empty"><div class="empty-icon">~</div>No trades yet</div>';

  const candleMap = new Map();
  for (const t of trades) {
    const slug = t.candle_slug || 'unknown';
    if (!candleMap.has(slug)) candleMap.set(slug, { trades: [], res: null });
    candleMap.get(slug).trades.push(t);
  }
  for (const r of resolutions) {
    if (candleMap.has(r.slug)) candleMap.get(r.slug).res = r;
  }

  const candles = [...candleMap.entries()].sort((a, b) => {
    const tA = a[1].trades[0]?.timestamp || '';
    const tB = b[1].trades[0]?.timestamp || '';
    return tB.localeCompare(tA);
  });

  const liveSlug = currentMarket?.slug || null;

  return candles.map(([slug, data], ci) => {
    const res = data.res;
    const isLive = slug === liveSlug;
    const collapsed = !isLive;
    const polyUrl = 'https://polymarket.com/event/' + slug;

    // Badge
    let badge;
    if (isLive) badge = '<span class="candle-badge live">LIVE</span>';
    else if (res) {
      const c = res.pnl > 0.001 ? 'win' : res.pnl < -0.001 ? 'loss' : 'flat';
      const lb = res.pnl > 0.001 ? 'WIN' : res.pnl < -0.001 ? 'LOSS' : 'FLAT';
      badge = `<span class="candle-badge ${c}">${lb}</span>`;
    } else badge = '<span class="candle-badge flat">PENDING</span>';

    // PnL
    let pnlH = '';
    if (res) {
      const v = res.pnl || 0;
      pnlH = `<span class="candle-pnl ${pnlCls(v)}">${pnlSign(v)}${v.toFixed(4)}</span>`;
    }

    // Action counts
    let buys=0, sells=0, holds=0;
    for (const t of data.trades) {
      if (t.risk_blocked) continue;
      if (t.action === 'BUY') buys++;
      else if (t.action === 'SELL') sells++;
      else holds++;
    }
    let pills = '';
    if (buys) pills += `<span class="ca-pill b">B${buys}</span>`;
    if (sells) pills += `<span class="ca-pill s">S${sells}</span>`;
    if (holds) pills += `<span class="ca-pill h">H${holds}</span>`;

    // End dot class
    let endCls = 'pending';
    if (res) endCls = res.winner;

    // Dots
    const dots = data.trades.map((t, i) => {
      const tr = t.time_remaining_at_trade || 0;
      const pct = Math.min(100, Math.max(0, ((CANDLE_DUR - tr) / CANDLE_DUR) * 100));
      let cls, lbl;
      if (t.risk_blocked) { cls = 'blocked'; lbl = 'X'; }
      else if (t.action === 'BUY') { cls = 'buy'; lbl = 'B'; }
      else if (t.action === 'SELL') { cls = 'sell'; lbl = 'S'; }
      else { cls = 'hold'; lbl = 'H'; }
      const did = `dot-${ci}-${i}`;
      return `<div class="tl-dot ${cls}" style="left:${pct.toFixed(1)}%" data-did="${did}" onclick="toggleDetail(this,event)">${lbl}</div>`;
    }).join('');

    // Details
    const details = data.trades.map((t, i) => {
      const did = `dot-${ci}-${i}`;
      const conf = t.confidence || 0;
      const cw = Math.round(conf * 100);
      const tr = t.time_remaining_at_trade || 0;
      const el = CANDLE_DUR - tr;
      const sc = t.token_side === 'up' ? 'var(--green)' : 'var(--red)';
      const sz = t.action === 'HOLD' ? '--' : t.size.toFixed(1);
      const fp = t.fill_price != null ? '$' + t.fill_price.toFixed(4) : '--';
      const bl = t.risk_blocked;
      let brRow = '';
      if (bl) brRow = `<div class="td-row"><span class="td-lbl">Blocked</span><span class="td-val" style="color:var(--amber)">${esc(t.risk_block_reason || 'Risk check')}</span></div>`;
      const al = bl ? 'BLOCKED ' + t.action : t.action;
      const ac = bl ? 'var(--amber)' : (t.action === 'BUY' ? 'var(--green)' : t.action === 'SELL' ? 'var(--red)' : 'var(--text-muted)');
      return `<div class="tl-detail" id="det-${did}">
        <div class="td-row"><span class="td-lbl">Time</span><span class="td-val">${t.timestamp ? shortTime(t.timestamp) : '--'} — ${Math.round(el)}s/${CANDLE_DUR}s (${Math.round(tr)}s left)</span></div>
        <div class="td-row"><span class="td-lbl">Action</span><span class="td-val"><strong style="color:${ac}">${al}</strong> <span style="color:${sc}">${t.token_side.toUpperCase()}</span></span></div>
        ${brRow}
        <div class="td-row"><span class="td-lbl">Size</span><span class="td-val">${sz} shares @ ${fp}</span></div>
        <div class="td-row"><span class="td-lbl">Conf</span><span class="td-val">${cw}%<span class="conf-bar"><span class="conf-fill" style="width:${cw}%;background:${confColor(conf)}"></span></span></span></div>
        <div class="td-reasoning">${esc(t.reasoning || 'No reasoning')}</div>
      </div>`;
    }).join('');

    return `<div class="candle-row${collapsed ? ' collapsed' : ''}">
      <div class="candle-hdr" onclick="toggleCandle(this.parentElement,event)">
        <span class="candle-chevron">&#9660;</span>
        <span class="candle-slug"><a href="${esc(polyUrl)}" target="_blank" onclick="event.stopPropagation()">${esc(truncSlug(slug, 32))}</a></span>
        <span class="candle-actions">${pills}</span>
        ${pnlH}
        ${badge}
      </div>
      <div class="candle-body">
        <div class="tl-wrap">
          <div class="tl-line"></div>
          <div class="tl-end start"></div>
          <div class="tl-end finish ${endCls}"></div>
          <div class="tl-labels"><span>0:00</span><span>5:00</span></div>
          ${dots}
        </div>
        ${details}
      </div>
    </div>`;
  }).join('');
}

function toggleCandle(row, e) {
  if (e.target.tagName === 'A') return;
  row.classList.toggle('collapsed');
}

function toggleDetail(dot, e) {
  e.stopPropagation();
  const did = dot.getAttribute('data-did');
  const det = document.getElementById('det-' + did);
  if (!det) return;
  const wasVis = det.classList.contains('vis');
  const row = dot.closest('.candle-row');
  row.querySelectorAll('.tl-detail').forEach(d => d.classList.remove('vis'));
  row.querySelectorAll('.tl-dot').forEach(d => d.classList.remove('sel'));
  if (!wasVis) { det.classList.add('vis'); dot.classList.add('sel'); }
}

// ═══ RESOLUTIONS TABLE ═══
function buildResTable(resolutions) {
  if (!resolutions.length) return '<div class="empty"><div class="empty-icon">~</div>No resolutions</div>';
  const rows = [...resolutions].reverse().map(r => {
    const c = r.pnl > 0.001 ? 'win' : r.pnl < -0.001 ? 'loss' : 'flat';
    const lb = r.pnl > 0.001 ? 'WIN' : r.pnl < -0.001 ? 'LOSS' : 'FLAT';
    const ms = r.btc_move >= 0 ? '+' : '';
    return `<tr>
      <td title="${esc(r.slug)}">${truncSlug(r.slug, 22)}</td>
      <td><span class="res-b ${c}">${lb}</span> <span style="color:var(--text-muted);font-size:0.7rem">${r.winner.toUpperCase()}</span></td>
      <td>${ms}$${Math.abs(r.btc_move).toFixed(0)}</td>
      <td style="color:${r.pnl >= 0 ? 'var(--green)' : 'var(--red)'}">${pnlSign(r.pnl)}${r.pnl.toFixed(4)}</td>
    </tr>`;
  }).join('');
  return `<table class="res-table"><thead><tr><th data-tip="Polymarket candle market identifier">Slug</th><th data-tip="WIN if bot profited, LOSS if not. UP/DOWN shows which side won.">Result</th><th data-tip="BTC price change during the 5-minute candle (close - open)">BTC Move</th><th data-tip="Bot's profit or loss on this candle from token positions">PnL</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ═══ PNL CHART ═══
function buildChart(resolutions) {
  if (resolutions.length < 2) return '<div class="empty"><div class="empty-icon">~</div>Need 2+ resolutions</div>';
  const ser = [0]; let cum = 0;
  for (const r of resolutions) { cum += r.pnl; ser.push(cum); }
  const W = 340, H = 150;
  const pad = { t: 8, r: 40, b: 18, l: 8 };
  const pW = W - pad.l - pad.r, pH = H - pad.t - pad.b;
  const mn = Math.min(0, ...ser), mx = Math.max(0, ...ser);
  const rng = mx - mn || 1;
  const x = i => pad.l + (i / (ser.length - 1)) * pW;
  const y = v => pad.t + pH - ((v - mn) / rng) * pH;
  const pts = ser.map((v, i) => x(i).toFixed(1) + ',' + y(v).toFixed(1)).join(' ');
  const aPts = pts + ' ' + x(ser.length-1).toFixed(1)+','+y(0).toFixed(1)+' '+x(0).toFixed(1)+','+y(0).toFixed(1);
  const col = cum >= 0 ? 'var(--green)' : 'var(--red)';
  const zy = y(0);
  let lbls = `<text class="chart-lbl" x="${W-pad.r+5}" y="${pad.t+3}" text-anchor="start">${mx.toFixed(2)}</text>`;
  lbls += `<text class="chart-lbl" x="${W-pad.r+5}" y="${H-pad.b}" text-anchor="start">${mn.toFixed(2)}</text>`;
  if (mn < 0 && mx > 0) lbls += `<text class="chart-lbl" x="${W-pad.r+5}" y="${zy+3}" text-anchor="start">0</text>`;
  const circles = ser.map((v,i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="${col}" stroke="var(--bg-surface)" stroke-width="1.5"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line class="chart-zero" x1="${pad.l}" y1="${zy}" x2="${W-pad.r}" y2="${zy}"/>
    <polygon class="chart-area" points="${aPts}" fill="${col}"/>
    <polyline class="chart-line" points="${pts}" stroke="${col}"/>
    ${circles}${lbls}</svg>`;
}

// ═══ COUNTDOWN ═══
function tickCountdown() {
  const el = document.getElementById('countdown');
  if (!el || countdownTarget <= 0) { if (el) { el.textContent = '--:--'; el.className = 'countdown-val'; } return; }
  const rem = Math.max(0, (countdownTarget - Date.now()) / 1000);
  el.textContent = Math.floor(rem / 60) + ':' + String(Math.floor(rem % 60)).padStart(2, '0');
  el.className = 'countdown-val' + (rem < 30 ? ' urgent' : '');
}

function tickRefresh() {
  $('refreshInfo').textContent = 'Refresh ' + refreshCountdown + 's';
  refreshCountdown--;
  if (refreshCountdown < 0) fetchData();
}

fetchData();
setInterval(tickCountdown, 1000);
setInterval(tickRefresh, 1000);
</script>
