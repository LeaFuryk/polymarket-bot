        Total potential improvement: ~$${da.total_potential_improvement}/iter
      </div>
    </div>`;
  }

  return h;
}

function buildChangesPanel(it, prev) {
  const ta = it.trade_analysis || {};
  const pta = prev.trade_analysis || {};
  const ra = it.resolution_analysis || {};
  const pra = prev.resolution_analysis || {};
  const cal = it.calibration || {};
  const pcal = prev.calibration || {};
  const ex = it.exit_analysis || {};
  const pex = prev.exit_analysis || {};

  // Define all metrics to compare: [label, current, previous, format, higherIsBetter]
  const metrics = [
    ['Win Rate', it.win_rate, prev.win_rate, v => (v*100).toFixed(0) + '%', true],
    ['Net Result', it.net_result, prev.net_result, v => (v>=0?'+':'-') + '$' + Math.abs(v).toFixed(2), true],
    ['Total PnL', it.total_pnl, prev.total_pnl, v => (v>=0?'+':'-') + '$' + Math.abs(v).toFixed(2), true],
    ['Avg Win', ra.avg_win_pnl, pra.avg_win_pnl, v => '$' + Math.abs(v).toFixed(2), true],
    ['Avg Loss', ra.avg_loss_pnl, pra.avg_loss_pnl, v => '-$' + Math.abs(v).toFixed(2), false],
    ['Biggest Win', ra.biggest_win, pra.biggest_win, v => '+$' + v.toFixed(2), true],
    ['Biggest Loss', ra.biggest_loss, pra.biggest_loss, v => '-$' + Math.abs(v).toFixed(2), false],
    ['R/R Ratio', ra.avg_loss_pnl ? Math.abs(ra.avg_win_pnl/ra.avg_loss_pnl) : 0, pra.avg_loss_pnl ? Math.abs(pra.avg_win_pnl/pra.avg_loss_pnl) : 0, v => v.toFixed(2) + 'x', true],
    ['Avg Fill', ta.avg_fill_price, pta.avg_fill_price, v => '$' + v.toFixed(3), false],
    ['Hold Rate', ta.hold_rate, pta.hold_rate, v => (v*100).toFixed(0) + '%', true],
    ['AI Cost', it.ai_cost, prev.ai_cost, v => '$' + v.toFixed(2), false],
    ['Fees', it.total_fees, prev.total_fees, v => '$' + v.toFixed(2), false],
    ['Candles', it.total_candles, prev.total_candles, v => v, null],
    ['Trades', it.total_trades, prev.total_trades, v => v, null],
    ['Avg BTC Move', ra.avg_btc_move, pra.avg_btc_move, v => '$' + v, null],
    ['Shadow Acc', cal.shadow_accuracy, pcal.shadow_accuracy, v => v != null ? (v*100).toFixed(0) + '%' : '--', true],
    ['Good Exits', ex.good_exit_rate, pex.good_exit_rate, v => (v*100).toFixed(0) + '%', true],
    ['Exit Saved', ex.total_saved, pex.total_saved, v => '$' + v.toFixed(2), true],
  ];

  let items = '';
  for (const [label, curr, prev, fmt, hib] of metrics) {
    if (curr == null && prev == null) continue;
    const c = curr ?? 0;
    const p = prev ?? 0;
    const delta = c - p;
    const absDelta = Math.abs(delta);

    // Determine if improved, regressed, or neutral
    let cls = 'neutral';
    if (hib === true && delta > 0.0001) cls = 'improved';
    else if (hib === true && delta < -0.0001) cls = 'regressed';
    else if (hib === false && delta < -0.0001) cls = 'improved';
    else if (hib === false && delta > 0.0001) cls = 'regressed';

    // Format delta
    let deltaStr = '';
    if (absDelta > 0.0001) {
      const sign = delta >= 0 ? '+' : '-';
      // Use matching format for deltas
      if (label.includes('Rate') || label.includes('Win Rate') || label === 'Shadow Acc' || label === 'Good Exits') {
        deltaStr = sign + (Math.abs(delta)*100).toFixed(1) + 'pp';
      } else if (label === 'R/R Ratio') {
        deltaStr = sign + absDelta.toFixed(2) + 'x';
      } else if (label === 'Candles' || label === 'Trades') {
        deltaStr = sign + Math.abs(Math.round(delta));
      } else {
        deltaStr = sign + '$' + absDelta.toFixed(2);
      }
    }

    items += `<div class="iv-change-item">
      <span class="iv-change-label">${label}</span>
      <div class="iv-change-vals">
        <span class="iv-change-prev">${fmt(p)}</span>
        <span class="iv-change-arrow">&rarr;</span>
        <span class="iv-change-curr">${fmt(c)}</span>
        ${deltaStr ? `<span class="iv-change-delta ${cls}">${deltaStr}</span>` : ''}
      </div>
    </div>`;
  }

  return `<div class="iv-changes">
    <div class="iv-changes-title">Changes from ${esc(prev.label)}</div>
    <div class="iv-changes-grid">${items}</div>
  </div>`;
}

function buildLargePnlChart(pnls) {
  if (!pnls || pnls.length < 2) return '';
  const W = 800, H = 120, pad = { t: 10, r: 50, b: 18, l: 10 };
  const pW = W - pad.l - pad.r, pH = H - pad.t - pad.b;
  const mn = Math.min(0, ...pnls), mx = Math.max(0, ...pnls);
  const rng = mx - mn || 1;
  const x = i => pad.l + (i / (pnls.length - 1)) * pW;
  const y = v => pad.t + pH - ((v - mn) / rng) * pH;
  const pts = pnls.map((v, i) => x(i).toFixed(1) + ',' + y(v).toFixed(1)).join(' ');
  const zy = y(0);
  const lastV = pnls[pnls.length - 1];
  const col = lastV >= 0 ? 'var(--green)' : 'var(--red)';
  const aPts = pts + ` ${x(pnls.length-1).toFixed(1)},${zy.toFixed(1)} ${x(0).toFixed(1)},${zy.toFixed(1)}`;

  let lbls = `<text class="chart-lbl" x="${W-pad.r+5}" y="${pad.t+4}" text-anchor="start" fill="var(--text-muted)" font-size="10">${mx.toFixed(2)}</text>`;
  lbls += `<text class="chart-lbl" x="${W-pad.r+5}" y="${H-pad.b}" text-anchor="start" fill="var(--text-muted)" font-size="10">${mn.toFixed(2)}</text>`;
  if (mn < 0 && mx > 0) lbls += `<text class="chart-lbl" x="${W-pad.r+5}" y="${zy+4}" text-anchor="start" fill="var(--text-muted)" font-size="10">0</text>`;
  lbls += `<text x="${x(pnls.length-1).toFixed(1)}" y="${(y(lastV) - 6).toFixed(1)}" text-anchor="end" fill="${col}" font-size="11" font-weight="600">${lastV >= 0 ? '+' : ''}${lastV.toFixed(2)}</text>`;

  const circles = pnls.map((v,i) => {
    if (i === 0 || i === pnls.length - 1 || (pnls.length > 10 && i % Math.ceil(pnls.length / 12) !== 0)) {
      if (i !== 0 && i !== pnls.length - 1) return '';
    }
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="${col}" stroke="var(--bg-surface)" stroke-width="1.5"/>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${pad.l}" y1="${zy}" x2="${W-pad.r}" y2="${zy}" stroke="var(--text-muted)" stroke-width="0.5" stroke-dasharray="3 3"/>
    <polygon points="${aPts}" fill="${col}" opacity="0.12"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${circles}${lbls}
  </svg>`;
}

function renderSessionHistoryMd(md) {
  // Parse markdown table into HTML table
  const lines = md.trim().split('\n').filter(l => l.trim());
  if (lines.length < 3) return `<div style="font-size:0.75rem;color:var(--text-secondary);white-space:pre-wrap">${esc(md)}</div>`;

  // Check if it's a markdown table (has | separators)
  if (!lines[0].includes('|')) {
    return `<div style="font-size:0.75rem;color:var(--text-secondary);white-space:pre-wrap">${esc(md)}</div>`;
  }

  const parseRow = line => line.split('|').map(c => c.trim()).filter(c => c);
  const headers = parseRow(lines[0]);
  // Skip separator line (line[1])
  const rows = lines.slice(2).map(parseRow);

  let h = `<table class="iv-session-table"><thead><tr>`;
  for (const hdr of headers) h += `<th>${esc(hdr)}</th>`;
  h += `</tr></thead><tbody>`;
  for (const row of rows) {
    h += `<tr>`;
    for (const cell of row) h += `<td>${esc(cell)}</td>`;
    h += `</tr>`;
  }
  h += `</tbody></table>`;
  return h;
}

// ═══ CANDLE TIMELINES ═══
function buildCandleTimelines(trades, resolutions, currentMarket) {
  if (!trades.length) return '<div class="empty"><div class="empty-icon">~</div>No trades yet</div>';

  const candleMap = new Map();
  for (const t of trades) {
    const slug = t.candle_slug || 'unknown';
    if (!candleMap.has(slug)) candleMap.set(slug, { trades: [], res: null });
    candleMap.get(slug).trades.push(t);
  }
  for (const r of resolutions) {
    if (candleMap.has(r.slug)) candleMap.get(r.slug).res = r;
  }

  const candles = [...candleMap.entries()].sort((a, b) => {
    const tA = a[1].trades[0]?.timestamp || '';
    const tB = b[1].trades[0]?.timestamp || '';
    return tB.localeCompare(tA);
  });

  const liveSlug = currentMarket?.slug || null;

  return candles.map(([slug, data], ci) => {
    const res = data.res;
    const isLive = slug === liveSlug;
    const collapsed = !isLive;
    const polyUrl = 'https://polymarket.com/event/' + slug;

    // Badge
    let badge;
    if (isLive) badge = '<span class="candle-badge live">LIVE</span>';
    else if (res) {
      const c = res.pnl > 0.001 ? 'win' : res.pnl < -0.001 ? 'loss' : 'flat';
      const lb = res.pnl > 0.001 ? 'WIN' : res.pnl < -0.001 ? 'LOSS' : 'FLAT';
      badge = `<span class="candle-badge ${c}">${lb}</span>`;
    } else badge = '<span class="candle-badge flat">PENDING</span>';

    // PnL
    let pnlH = '';
    if (res) {
      const v = res.pnl || 0;
      pnlH = `<span class="candle-pnl ${pnlCls(v)}">${pnlSign(v)}${v.toFixed(4)}</span>`;
    }

    // Action counts
    let buys=0, sells=0, holds=0;
    for (const t of data.trades) {
      if (t.risk_blocked) continue;
      if (t.action === 'BUY') buys++;
      else if (t.action === 'SELL') sells++;
      else holds++;
    }
    let pills = '';
    if (buys) pills += `<span class="ca-pill b">B${buys}</span>`;
    if (sells) pills += `<span class="ca-pill s">S${sells}</span>`;
    if (holds) pills += `<span class="ca-pill h">H${holds}</span>`;

    // End dot class
    let endCls = 'pending';
    if (res) endCls = res.winner;

    // Row tinting class (win/loss left border)
    let rowTint = '';
    if (res && res.pnl > 0.001) rowTint = ' row-win';
    else if (res && res.pnl < -0.001) rowTint = ' row-loss';

    // BTC move label at endpoint
    let btcLabel = '';
    if (res && res.btc_move != null) {
      const mv = res.btc_move;
      const mvSign = mv >= 0 ? '+' : '';
      const mvCol = mv >= 0 ? 'var(--green)' : 'var(--red)';
      btcLabel = `<span class="tl-btc-label" style="color:${mvCol}">${mvSign}$${Math.abs(mv).toFixed(0)}</span>`;
    }

    // Regime color bar
    let regimeBar = '';
    if (lastData?.adaptive_entry) {
      const thresh = lastData.adaptive_entry.btc_threshold;
      const rClass = thresh <= 20 ? 'calm' : thresh >= 40 ? 'choppy' : 'moderate';
      regimeBar = `<div class="tl-regime-bar ${rClass}"></div>`;
    }

    // Dots + entry price labels
    let entryLabels = '';
    const dots = data.trades.map((t, i) => {
      const tr = t.time_remaining_at_trade || 0;
      const pct = Math.min(100, Math.max(0, ((CANDLE_DUR - tr) / CANDLE_DUR) * 100));
      let cls, lbl;
      if (t.risk_blocked) { cls = 'blocked'; lbl = 'X'; }
      else if (t.action === 'BUY') { cls = 'buy'; lbl = 'B'; }
      else if (t.action === 'SELL') { cls = 'sell'; lbl = 'S'; }
      else { cls = 'hold'; lbl = 'H'; }
      const did = `dot-${ci}-${i}`;
      // Entry price label below BUY dots
      if (t.action === 'BUY' && !t.risk_blocked && t.fill_price != null) {
        entryLabels += `<span class="tl-entry-price" style="left:${pct.toFixed(1)}%">$${t.fill_price.toFixed(2)}</span>`;
      }
      return `<div class="tl-dot ${cls}" style="left:${pct.toFixed(1)}%" data-did="${did}" onclick="toggleDetail(this,event)">${lbl}</div>`;
    }).join('');

    // Details
    const details = data.trades.map((t, i) => {
      const did = `dot-${ci}-${i}`;
      const conf = t.confidence || 0;
      const cw = Math.round(conf * 100);
      const tr = t.time_remaining_at_trade || 0;
      const el = CANDLE_DUR - tr;
      const sc = t.token_side === 'up' ? 'var(--green)' : 'var(--red)';
      const sz = t.action === 'HOLD' ? '--' : t.size.toFixed(1);
      const fp = t.fill_price != null ? '$' + t.fill_price.toFixed(4) : '--';
      const bl = t.risk_blocked;
      let brRow = '';
      if (bl) brRow = `<div class="td-row"><span class="td-lbl">Blocked</span><span class="td-val" style="color:var(--amber)">${esc(t.risk_block_reason || 'Risk check')}</span></div>`;
      const al = bl ? 'BLOCKED ' + t.action : t.action;
      const ac = bl ? 'var(--amber)' : (t.action === 'BUY' ? 'var(--green)' : t.action === 'SELL' ? 'var(--red)' : 'var(--text-muted)');
      return `<div class="tl-detail" id="det-${did}">
        <div class="td-row"><span class="td-lbl">Time</span><span class="td-val">${t.timestamp ? shortTime(t.timestamp) : '--'} — ${Math.round(el)}s/${CANDLE_DUR}s (${Math.round(tr)}s left)</span></div>
        <div class="td-row"><span class="td-lbl">Action</span><span class="td-val"><strong style="color:${ac}">${al}</strong> <span style="color:${sc}">${t.token_side.toUpperCase()}</span></span></div>
        ${brRow}
        <div class="td-row"><span class="td-lbl">Size</span><span class="td-val">${sz} shares @ ${fp}</span></div>
        <div class="td-row"><span class="td-lbl">Conf</span><span class="td-val">${cw}%<span class="conf-bar"><span class="conf-fill" style="width:${cw}%;background:${confColor(conf)}"></span></span></span></div>
        <div class="td-reasoning">${esc(t.reasoning || 'No reasoning')}</div>
      </div>`;
    }).join('');

    return `<div class="candle-row${collapsed ? ' collapsed' : ''}${rowTint}">
      <div class="candle-hdr" onclick="toggleCandle(this.parentElement,event)">
        <span class="candle-chevron">&#9660;</span>
        <span class="candle-slug"><a href="${esc(polyUrl)}" target="_blank" onclick="event.stopPropagation()">${esc(truncSlug(slug, 32))}</a></span>
        <span class="candle-actions">${pills}</span>
        ${pnlH}
        ${badge}
      </div>
      <div class="candle-body">
        <div class="tl-wrap">
          <div class="tl-line"></div>
          ${regimeBar}
          <div class="tl-end start"></div>
          <div class="tl-end finish ${endCls}"></div>
          ${btcLabel}
          <div class="tl-labels"><span>0:00</span><span>5:00</span></div>
          ${dots}
          ${entryLabels}
        </div>
        ${details}
      </div>
    </div>`;
  }).join('');
}

function toggleCandle(row, e) {
  if (e.target.tagName === 'A') return;
  row.classList.toggle('collapsed');
}

function toggleDetail(dot, e) {
  e.stopPropagation();
  const did = dot.getAttribute('data-did');
  const det = document.getElementById('det-' + did);
  if (!det) return;
  const wasVis = det.classList.contains('vis');
  const row = dot.closest('.candle-row');
  row.querySelectorAll('.tl-detail').forEach(d => d.classList.remove('vis'));
  row.querySelectorAll('.tl-dot').forEach(d => d.classList.remove('sel'));
  if (!wasVis) { det.classList.add('vis'); dot.classList.add('sel'); }
}

// ═══ RESOLUTIONS TABLE ═══
function buildResTable(resolutions) {
  if (!resolutions.length) return '<div class="empty"><div class="empty-icon">~</div>No resolutions</div>';
  const rows = [...resolutions].reverse().map(r => {
    const c = r.pnl > 0.001 ? 'win' : r.pnl < -0.001 ? 'loss' : 'flat';
    const lb = r.pnl > 0.001 ? 'WIN' : r.pnl < -0.001 ? 'LOSS' : 'FLAT';
    const ms = r.btc_move >= 0 ? '+' : '';
    return `<tr>
      <td title="${esc(r.slug)}">${truncSlug(r.slug, 22)}</td>
      <td><span class="res-b ${c}">${lb}</span> <span style="color:var(--text-muted);font-size:0.7rem">${r.winner.toUpperCase()}</span></td>
      <td>${ms}$${Math.abs(r.btc_move).toFixed(0)}</td>
      <td style="color:${r.pnl >= 0 ? 'var(--green)' : 'var(--red)'}">${pnlSign(r.pnl)}${r.pnl.toFixed(4)}</td>
    </tr>`;
  }).join('');
  return `<table class="res-table"><thead><tr><th data-tip="Polymarket candle market identifier">Slug</th><th data-tip="WIN if bot profited, LOSS if not. UP/DOWN shows which side won.">Result</th><th data-tip="BTC price change during the 5-minute candle (close - open)">BTC Move</th><th data-tip="Bot's profit or loss on this candle from token positions">PnL</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ═══ PNL CHART ═══
function buildChart(resolutions) {
  if (resolutions.length < 2) return '<div class="empty"><div class="empty-icon">~</div>Need 2+ resolutions</div>';
  const ser = [0]; let cum = 0;
  for (const r of resolutions) { cum += r.pnl; ser.push(cum); }
  const W = 340, H = 150;
  const pad = { t: 8, r: 40, b: 18, l: 8 };
  const pW = W - pad.l - pad.r, pH = H - pad.t - pad.b;
  const mn = Math.min(0, ...ser), mx = Math.max(0, ...ser);
  const rng = mx - mn || 1;
  const x = i => pad.l + (i / (ser.length - 1)) * pW;
  const y = v => pad.t + pH - ((v - mn) / rng) * pH;
  const pts = ser.map((v, i) => x(i).toFixed(1) + ',' + y(v).toFixed(1)).join(' ');
  const aPts = pts + ' ' + x(ser.length-1).toFixed(1)+','+y(0).toFixed(1)+' '+x(0).toFixed(1)+','+y(0).toFixed(1);
  const col = cum >= 0 ? 'var(--green)' : 'var(--red)';
  const zy = y(0);
  let lbls = `<text class="chart-lbl" x="${W-pad.r+5}" y="${pad.t+3}" text-anchor="start">${mx.toFixed(2)}</text>`;
  lbls += `<text class="chart-lbl" x="${W-pad.r+5}" y="${H-pad.b}" text-anchor="start">${mn.toFixed(2)}</text>`;
  if (mn < 0 && mx > 0) lbls += `<text class="chart-lbl" x="${W-pad.r+5}" y="${zy+3}" text-anchor="start">0</text>`;
  const circles = ser.map((v,i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="${col}" stroke="var(--bg-surface)" stroke-width="1.5"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line class="chart-zero" x1="${pad.l}" y1="${zy}" x2="${W-pad.r}" y2="${zy}"/>
    <polygon class="chart-area" points="${aPts}" fill="${col}"/>
    <polyline class="chart-line" points="${pts}" stroke="${col}"/>
    ${circles}${lbls}</svg>`;
}

// ═══ ITERATION ANALYSIS CARDS ═══
function iterDelta(val, prevVal, fmt, invert) {
  if (prevVal == null) return '';
  const d = val - prevVal;
  let cls = d >= 0 ? 'pos' : 'neg';
  if (invert) cls = d >= 0 ? 'neg' : 'pos';
  const sign = d >= 0 ? '+' : '';
  return `<span class="iter-delta ${cls}">${sign}${fmt(d)}</span>`;
}

function buildMiniSparkline(pnls) {
  if (!pnls || pnls.length < 2) return '';
  const W = 200, H = 32, pad = 2;
  const mn = Math.min(0, ...pnls), mx = Math.max(0, ...pnls);
  const rng = mx - mn || 1;
  const x = i => pad + (i / (pnls.length - 1)) * (W - 2*pad);
  const y = v => pad + (H - 2*pad) - ((v - mn) / rng) * (H - 2*pad);
  const pts = pnls.map((v, i) => x(i).toFixed(1) + ',' + y(v).toFixed(1)).join(' ');
  const zy = y(0);
  const lastV = pnls[pnls.length - 1];
  const col = lastV >= 0 ? 'var(--green)' : 'var(--red)';
  const aPts = pts + ` ${x(pnls.length-1).toFixed(1)},${zy.toFixed(1)} ${x(0).toFixed(1)},${zy.toFixed(1)}`;
  return `<div class="iter-spark"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${zy}" x2="${W-pad}" y2="${zy}" stroke="var(--text-muted)" stroke-width="0.5" stroke-dasharray="2 2"/>
    <polygon points="${aPts}" fill="${col}" opacity="0.15"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg></div>`;
}

function buildCalBins(bins) {
  if (!bins || !bins.length) return '<div style="font-size:0.6rem;color:var(--text-muted)">No data</div>';
  let h = '<div class="iter-cal-bins">';
  for (const b of bins) {
    const wr = b.win_rate;
    const barH = Math.max(3, wr * 26);
    const col = wr >= 0.55 ? 'var(--green)' : wr >= 0.45 ? 'var(--amber)' : 'var(--red)';
    const op = b.reliable ? '1' : '0.5';
    h += `<div class="iter-cal-bin" style="height:${barH}px;background:${col};opacity:${op}" title="${b.range}: ${(wr*100).toFixed(0)}% (${b.wins}W/${b.losses}L)"></div>`;
  }
  h += '</div>';
  return h;
}

function buildIterCards(iterations) {
  return iterations.map((it, i) => {
    const prev = i > 0 ? iterations[i - 1] : null;
    const wr = (it.win_rate * 100);
    const net = it.net_result || 0;
    const ta = it.trade_analysis || {};
    const ra = it.resolution_analysis || {};
    const cal = it.calibration || {};
    const ex = it.exit_analysis || {};

    // Date range
    const start = it.date_range?.start ? new Date(it.date_range.start).toLocaleDateString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '--';
    const end = it.date_range?.end ? new Date(it.date_range.end).toLocaleDateString(undefined, {hour:'2-digit',minute:'2-digit'}) : '';
    const dur = it.date_range?.start && it.date_range?.end
      ? ((new Date(it.date_range.end) - new Date(it.date_range.start)) / 3600000).toFixed(1) + 'h'
      : '--';

    // Entry price distribution
    const totalFills = (ta.cheap_entries||0) + (ta.mid_entries||0) + (ta.expensive_entries||0);
    const cheapPct = totalFills > 0 ? (ta.cheap_entries / totalFills * 100) : 0;
    const midPct = totalFills > 0 ? (ta.mid_entries / totalFills * 100) : 0;
    const expPct = totalFills > 0 ? (ta.expensive_entries / totalFills * 100) : 0;

    const fmtD = d => '$' + Math.abs(d).toFixed(2);
    const fmtP = d => (d * 100).toFixed(1) + '%';

    let card = `<div class="iter-card">`;

    // Header: label + net result
    card += `<div class="iter-card-hdr">
      <div>
        <div class="iter-card-label">${esc(it.label)}</div>
        <div class="iter-card-date">${start}${end ? ' – ' + end : ''} (${dur})</div>
      </div>
      <div class="iter-card-net ${net >= 0 ? 'v-green' : 'v-red'}">${net >= 0 ? '+' : ''}$${net.toFixed(2)}
        <div style="font-size:0.55rem;color:var(--text-muted);font-weight:400;text-align:right">net result</div>
      </div>
    </div>`;

    // Row 1: Core performance metrics
    card += `<div class="iter-section">
      <div class="iter-section-label">Performance</div>
      <div class="iter-metrics">
        <div class="iter-metric">
          <div class="iter-metric-lbl">Win Rate</div>
          <div class="iter-metric-val ${wr >= 50 ? 'v-green' : 'v-red'}">${wr.toFixed(0)}%${iterDelta(it.win_rate, prev?.win_rate, fmtP)}</div>
        </div>
        <div class="iter-metric">
          <div class="iter-metric-lbl">PnL</div>
          <div class="iter-metric-val ${it.total_pnl >= 0 ? 'v-green' : 'v-red'}">${fmt$(it.total_pnl, 2)}${iterDelta(it.total_pnl, prev?.total_pnl, fmtD)}</div>
        </div>
        <div class="iter-metric">
          <div class="iter-metric-lbl">W / L</div>
          <div class="iter-metric-val">${it.wins || 0}<span style="color:var(--green)">W</span> / ${it.losses || 0}<span style="color:var(--red)">L</span></div>
        </div>
        <div class="iter-metric">
          <div class="iter-metric-lbl">AI Cost</div>
          <div class="iter-metric-val v-amber">${fmt$(it.ai_cost, 2)}${iterDelta(it.ai_cost, prev?.ai_cost, fmtD, true)}</div>
        </div>
        <div class="iter-metric">
          <div class="iter-metric-lbl">Fees</div>
          <div class="iter-metric-val">${fmt$(it.total_fees, 2)}</div>
        </div>
        <div class="iter-metric">
          <div class="iter-metric-lbl">Candles</div>
          <div class="iter-metric-val">${it.total_candles || 0}</div>
        </div>
      </div>
      ${it.final_cash != null ? `<div style="margin-top:0.3rem;display:flex;gap:0.6rem;font-size:0.7rem">
        <span style="color:var(--text-muted)">Final cash:</span> <span style="color:var(--cyan)">${fmt$(it.final_cash, 2)}</span>
        <span style="color:var(--text-muted)">Portfolio:</span> <span style="color:var(--blue)">${fmt$(it.final_portfolio_value, 2)}</span>
      </div>` : ''}
    </div>`;

    // PnL sparkline
    if (ra.cumulative_pnl?.length > 1) {
      card += `<div class="iter-section">
        <div class="iter-section-label">PnL Curve</div>
        ${buildMiniSparkline(ra.cumulative_pnl)}
      </div>`;
    }

    // Row 2: Trade quality
    if (ta.total_buys > 0) {
      card += `<div class="iter-section">
        <div class="iter-section-label">Trade Quality</div>
        <div class="iter-metrics">
          <div class="iter-metric">
            <div class="iter-metric-lbl">Avg Entry</div>
            <div class="iter-metric-val ${ta.avg_fill_price < 0.50 ? 'v-green' : ta.avg_fill_price > 0.65 ? 'v-red' : 'v-amber'}">${fmt$(ta.avg_fill_price, 3)}${iterDelta(ta.avg_fill_price, prev?.trade_analysis?.avg_fill_price, fmtD, true)}</div>
          </div>
          <div class="iter-metric">
            <div class="iter-metric-lbl">Avg Conf</div>
            <div class="iter-metric-val">${(ta.avg_confidence * 100).toFixed(0)}%</div>
          </div>
          <div class="iter-metric">
            <div class="iter-metric-lbl">Hold Rate</div>
            <div class="iter-metric-val">${(ta.hold_rate * 100).toFixed(0)}%</div>
          </div>
        </div>`;
      // Entry price distribution bar
      if (totalFills > 0) {
        card += `<div style="margin-top:0.35rem">
          <div style="font-size:0.55rem;color:var(--text-muted);margin-bottom:0.15rem">Entry Price Distribution</div>
          <div class="iter-entry-bar">
            <div class="iter-entry-seg cheap" style="width:${cheapPct}%"></div>
            <div class="iter-entry-seg mid" style="width:${midPct}%"></div>
            <div class="iter-entry-seg expensive" style="width:${expPct}%"></div>
          </div>
          <div class="iter-entry-legend">
            <span class="cheap">&lt;$0.40 (${ta.cheap_entries})</span>
            <span class="mid">$0.40–0.60 (${ta.mid_entries})</span>
            <span class="expensive">&gt;$0.60 (${ta.expensive_entries})</span>
          </div>
        </div>`;
      }
      card += `</div>`;
    }

    // Row 3: Resolution analysis
    if (ra.total > 0) {
      card += `<div class="iter-section">
        <div class="iter-section-label">Resolution Stats</div>
        <div class="iter-metrics">
          <div class="iter-metric">
            <div class="iter-metric-lbl">Avg BTC Move</div>
            <div class="iter-metric-val">$${ra.avg_btc_move}</div>
          </div>
          <div class="iter-metric">
            <div class="iter-metric-lbl">Avg Win</div>
            <div class="iter-metric-val v-green">${fmt$(ra.avg_win_pnl, 3)}</div>
          </div>
          <div class="iter-metric">
            <div class="iter-metric-lbl">Avg Loss</div>
            <div class="iter-metric-val v-red">${fmt$(ra.avg_loss_pnl, 3)}</div>
          </div>
        </div>
      </div>`;
    }

    // Row 4: Intelligence — calibration + exits
    const hasCal = cal.bins?.length > 0;
    const hasExit = ex.total_exits > 0;
    if (hasCal || hasExit) {
      card += `<div class="iter-section">
        <div class="iter-section-label">Intelligence</div>
        <div class="iter-metrics">`;
      if (cal.shadow_accuracy != null) {
        card += `<div class="iter-metric">
          <div class="iter-metric-lbl">Shadow Acc</div>
          <div class="iter-metric-val ${cal.shadow_accuracy >= 0.7 ? 'v-green' : 'v-amber'}">${(cal.shadow_accuracy * 100).toFixed(0)}%${iterDelta(cal.shadow_accuracy, prev?.calibration?.shadow_accuracy, fmtP)}</div>
        </div>`;
      }
      if (hasExit) {
        card += `<div class="iter-metric">
          <div class="iter-metric-lbl">Good Exits</div>
          <div class="iter-metric-val ${ex.good_exit_rate >= 0.5 ? 'v-green' : 'v-red'}">${(ex.good_exit_rate * 100).toFixed(0)}%</div>
        </div>`;
        card += `<div class="iter-metric">
          <div class="iter-metric-lbl">Exit Saved</div>
          <div class="iter-metric-val v-green">${fmt$(ex.total_saved, 1)}</div>
        </div>`;
      }
      card += `</div>`;
      // Mini calibration bins
      if (hasCal) {
        card += `<div style="margin-top:0.3rem">
          <div style="font-size:0.55rem;color:var(--text-muted);margin-bottom:0.1rem">Calibration Curve</div>
          ${buildCalBins(cal.bins)}
        </div>`;
      }
      card += `</div>`;
    }

    card += `</div>`; // close iter-card
    return card;
  }).join('');
}

// ═══ COUNTDOWN ═══
function tickCountdown() {
  const el = document.getElementById('countdown');
  if (!el || countdownTarget <= 0) { if (el) { el.textContent = '--:--'; el.className = 'countdown-val'; } return; }
  const rem = Math.max(0, (countdownTarget - Date.now()) / 1000);
  el.textContent = Math.floor(rem / 60) + ':' + String(Math.floor(rem % 60)).padStart(2, '0');
  el.className = 'countdown-val' + (rem < 30 ? ' urgent' : '');
}

function tickRefresh() {
  $('refreshInfo').textContent = 'Refresh ' + refreshCountdown + 's';
  refreshCountdown--;
  if (refreshCountdown < 0) fetchData();
}

fetchData();
setInterval(tickCountdown, 1000);
setInterval(tickRefresh, 1000);
</script>
</body>
</html>
